<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Downloads</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#f8fafc;
    --muted:#94a3b8;
    --accent:#3b82f6;
    --border:rgba(255,255,255,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    background:linear-gradient(180deg,#111827,#0f172a);
    color:var(--text);
}

.container{
    width:min(1100px,95%);
    margin:auto;
    padding:30px 0;
}

header{
    text-align:center;
    margin-bottom:30px;
}

header h1{
    font-size:40px;
}

header p{
    color:var(--muted);
    margin-top:10px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px;
    display:flex;
    flex-direction:column;
    gap:15px;
}

.card-top{
    display:flex;
    align-items:center;
    gap:15px;
}

.app-image{
    width:64px;
    height:64px;
    border-radius:16px;
    object-fit:cover;
    background:#334155;
}

.card h2{
    font-size:20px;
}

.card p{
    color:var(--muted);
    margin-top:5px;
}

.meta{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.tag{
    background:#334155;
    padding:5px 10px;
    border-radius:999px;
    font-size:12px;
}

.actions{
    display:flex;
    gap:10px;
    margin-top:auto;
}

.btn{
    flex:1;
    text-align:center;
    padding:12px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    font-weight:bold;
}

.download{
    background:var(--accent);
}

.details{
    background:#374151;
}

footer{
    text-align:center;
    margin-top:35px;
    color:var(--muted);
}

@media(max-width:600px){

.actions{
    flex-direction:column;
}

.btn{
    width:100%;
}

}
</style>

</head>

<body>

<div class="container">

<header>
<h1>Downloads</h1>
<p>Escolha um aplicativo para baixar.</p>
</header>

<div class="grid">

<!-- Graveyard Keeper -->

<div class="card">

<div class="card-top">

<img src="graveyard-icon.png" class="app-image" alt="Graveyard Keeper">

<div>
<h2>Graveyard Keeper</h2>
<p>Um jogo onde você é um coveiro ligado a diversos mistérios.</p>
</div>

</div>

<div class="meta">
<span class="tag">Android</span>
<span class="tag">APK</span>
</div>

<div class="actions">
<a class="btn download" href="graveyard-keeper.apk" download>Baixar</a>
<a class="btn details" href="https://play.google.com/store/search?q=graveyard+keeper&c=apps" target="_blank">Detalhes</a>
</div>

</div>

<!-- Próximo app -->

<div class="card">

<div class="card-top">

<img src="https://placehold.co/64x64?text=+" class="app-image">

<div>
<h2>Em breve</h2>
<p>Novo aplicativo será adicionado.</p>
</div>

</div>

<div class="meta">
<span class="tag">Android</span>
</div>

<div class="actions">
<a class="btn download" href="#">Baixar</a>
</div>

</div>

<!-- Próximo app -->

<div class="card">

<div class="card-top">

<img src="https://placehold.co/64x64?text=+" class="app-image">

<div>
<h2>Em breve</h2>
<p>Novo aplicativo será adicionado.</p>
</div>

</div>

<div class="meta">
<span class="tag">Android</span>
</div>

<div class="actions">
<a class="btn download" href="#">Baixar</a>
</div>

</div>

</div>

<footer>
© 2026 • Lucas
</footer>

</div>

</body>
</html>
